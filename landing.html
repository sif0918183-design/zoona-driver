<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تراكا للنقل - اختيارك الأول </title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Tajawal Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Global Tech Tech Redesign Theme -->
    <link rel="stylesheet" href="shared/theme.css">

    <style>
        :root {
            --passenger: var(--Tracka-primary);
            --passenger-dark: var(--Tracka-primary-dark);
            --driver: var(--Tracka-primary);
            --driver-dark: var(--Tracka-primary-dark);
            --dark: var(--tech-text);
            --light: var(--tech-bg);
            --white: #ffffff;
            --gray: #64748b;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--white);
            color: var(--dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .splash-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .brand-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--Tracka-emerald-glow));
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: var(--grad-emerald);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-tagline {
            font-size: 1.1rem;
            color: var(--gray);
            font-weight: 500;
        }

        .options-container {
            width: 100%;
            max-width: 450px;
            display: grid;
            gap: 20px;
        }

        .option-card {
            background: var(--light);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .option-card:hover {
            transform: scale(1.02);
            background: var(--white);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .option-card.passenger:hover {
            border-color: var(--passenger);
        }

        .option-card.driver:hover {
            border-color: var(--driver);
        }

        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .passenger .icon-box {
            background: var(--Tracka-primary-light);
            color: var(--Tracka-primary);
        }

        .driver .icon-box {
            background: var(--Tracka-primary-light);
            color: var(--Tracka-primary);
        }

        .option-card:hover .icon-box {
            transform: scale(1.1) rotate(-5deg);
        }

        .passenger:hover .icon-box {
            background: var(--passenger);
            color: var(--white);
        }

        .driver:hover .icon-box {
            background: var(--driver);
            color: var(--white);
        }

        .option-info {
            flex: 1;
        }

        .option-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .option-desc {
            font-size: 0.95rem;
            color: var(--gray);
            line-height: 1.4;
        }

        .arrow-icon {
            font-size: 1.2rem;
            color: var(--gray);
            opacity: 0.3;
            transition: var(--transition);
        }

        .option-card:hover .arrow-icon {
            opacity: 1;
            transform: translateX(-5px);
            color: var(--dark);
        }

        .footer {
            padding: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--gray);
        }

        /* Loading Animation Layer */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--white);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--Tracka-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .brand-name { font-size: 2rem; }
            .option-card { padding: 20px; }
            .icon-box { width: 56px; height: 56px; font-size: 1.5rem; }
            .option-title { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

    <div class="splash-screen">
        <div class="brand-container">
            <img src="assets/branding/icon-512x512.png" alt="تراكا" class="brand-logo">
            <h1 class="brand-name">Tracka Transport</h1>
            <p class="brand-tagline">مشوارك بذكاء.. وأمان أكثر</p>
        </div>

        <div class="options-container">
            <!-- Passenger Option -->
            <div class="option-card passenger" onclick="selectApp('passenger')">
                <div class="icon-box">
                    <i class="ph-light ph-user"></i>
                </div>
                <div class="option-info">
                    <h2 class="option-title">أنا راكب</h2>
                    <p class="option-desc">اطلب رحلة الآن وسافر براحة تامة</p>
                </div>
                <div class="arrow-icon">
                    <i class="ph-light ph-caret-left"></i>
                </div>
            </div>

            <!-- Driver Option -->
            <div class="option-card driver" onclick="selectApp('driver')">
                <div class="icon-box">
                    <i class="ph-light ph-steering-wheel"></i>
                </div>
                <div class="option-info">
                    <h2 class="option-title">أنا سائق</h2>
                    <p class="option-desc">انضم إلينا وابدأ بزيادة دخلك اليوم</p>
                </div>
                <div class="arrow-icon">
                    <i class="ph-light ph-caret-left"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 تراكا للنقل. جميع الحقوق محفوظة.</p>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loader" id="main-loader"></div>
        <p id="loader-text" style="font-weight: 700; color: var(--dark);">جاري التحميل...</p>
    </div>

    <script>
        function selectApp(type) {
            // Save choice
            localStorage.setItem('user_app_choice', type);

            // Show loading
            const overlay = document.getElementById('loading-overlay');
            const loader = document.getElementById('main-loader');
            const loaderText = document.getElementById('loader-text');

            overlay.style.display = 'flex';
            if(type === 'driver') {
                loader.style.borderTopColor = 'var(--driver)';
                loaderText.innerText = 'جاري دخول تطبيق السائق...';
            } else {
                loader.style.borderTopColor = 'var(--passenger)';
                loaderText.innerText = 'جاري دخول تطبيق الراكب...';
            }

            // Register SW and redirect
            const swPath = type === 'passenger' ? 'passenger_app/sw-passenger.js' : 'driver_app/sw-driver.js';
            const targetUrl = type === 'passenger' ? 'passenger_app/index.html' : 'driver_app/index.html';

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(swPath).finally(() => {
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 800);
                });
            } else {
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 800);
            }
        }

        // Auto-redirect if returning within same session or specifically desired
        window.onload = () => {
            console.log('Landing page ready.');

            const userAppChoice = localStorage.getItem('user_app_choice');
            const driverData = localStorage.getItem('tarhal_driver');
            const customerData = localStorage.getItem('tarhal_customer');

            // Redirect logged-in drivers
            if (userAppChoice === 'driver' && driverData) {
                console.log('Driver already logged in, redirecting to driver_app...');
                window.location.href = 'driver_app/index.html';
                return;
            }

            // Redirect logged-in passengers
            if (userAppChoice === 'passenger' && customerData) {
                console.log('Passenger already logged in, redirecting to passenger_app...');
                window.location.href = 'passenger_app/index.html';
                return;
            }
        };
    </script>
</body>
</html>
