<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>طلب رحلة جديد - ترحال زونا</title>

    <!-- ✅ مكتبات التصميم -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/supabase-config.js"></script>
    <script src="../sound-manager.js"></script>

    <style>
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --primary-light: #dcfce7;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --warning: #f59e0b;
            --light: #f9fafb;
            --dark: #111827;
            --gray: #6b7280;
            --gray-light: #e5e7eb;
            --radius: 16px;
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #111827;
            height: 100vh;
            width: 100vw;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .full-screen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 16px 8px 16px;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        /* ✅ Header */
        .app-header {
            text-align: center;
            margin-bottom: 12px;
            padding-top: 4px;
            flex-shrink: 0;
        }
        
        .app-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* ✅ Countdown */
        .countdown-container {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--danger);
            border-radius: var(--radius);
            padding: 8px 12px;
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .timer-value {
            font-size: 40px;
            font-weight: 900;
            color: var(--danger);
            font-family: monospace;
            line-height: 1;
        }

        /* ✅ Ride Details */
        .ride-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 12px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            min-height: 0;
            margin-bottom: 8px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .detail-icon {
            font-size: 20px;
            color: var(--primary);
            width: 24px;
        }

        .detail-info {
            flex: 1;
        }

        .detail-label {
            font-size: 11px;
            color: var(--gray);
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            word-break: break-word;
        }

        .price-box {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 12px;
            border-radius: var(--radius);
            text-align: center;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .price-label {
            font-size: 13px;
            opacity: 0.9;
        }

        .price-value {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.2;
        }

        /* ✅ Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding-bottom: 0;
            flex-shrink: 0;
        }
        
        .btn {
            height: 56px;
            border-radius: var(--radius);
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            width: 100%;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-accept {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.4);
        }
        
        .btn-decline {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
            height: 50px;
        }

        /* ✅ Notification */
        #notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: white;
            color: var(--dark);
            padding: 14px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* تحسين للشاشات الصغيرة */
        @media (max-height: 700px) {
            .app-header h1 {
                font-size: 22px;
            }
            .timer-value {
                font-size: 36px;
            }
            .countdown-container {
                padding: 6px 10px;
            }
            .btn {
                height: 50px;
                font-size: 18px;
            }
            .btn-decline {
                height: 45px;
            }
            .price-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="full-screen-container">
        <!-- ✅ Header -->
        <header class="app-header">
            <h1>🚖 طلب رحلة جديد</h1>
        </header>
        
        <!-- ✅ Countdown -->
        <div class="countdown-container">
            <div style="font-size: 13px; margin-bottom: 2px;">الوقت المتبقي للرد</div>
            <div class="timer-value" id="countdown">60</div>
        </div>

        <!-- ✅ Ride Details Card -->
        <div class="ride-card">
            <div class="detail-row">
                <div class="detail-icon"><ion-icon name="person-circle-outline"></ion-icon></div>
                <div class="detail-info">
                    <div class="detail-label">العميل</div>
                    <div class="detail-value" id="customer-name">جاري التحميل...</div>
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-icon"><ion-icon name="navigate-outline"></ion-icon></div>
                <div class="detail-info">
                    <div class="detail-label">المسافة</div>
                    <div class="detail-value" id="distance">-- كم</div>
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-icon"><ion-icon name="location-outline"></ion-icon></div>
                <div class="detail-info">
                    <div class="detail-label">موقع الانطلاق</div>
                    <div class="detail-value" id="pickup-location" style="font-size: 14px;">جاري تحديد الموقع...</div>
                </div>
            </div>

            <div class="price-box">
                <div class="price-label">الأجرة المقدرة</div>
                <div class="price-value"><span id="amount">0</span> <small style="font-size: 14px;">SDG</small></div>
            </div>
        </div>

        <!-- ✅ Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-accept" onclick="handleAccept()" id="accept-btn" disabled>
                <ion-icon name="checkmark-circle"></ion-icon>
                قــبـول الـرحـلـة
            </button>
            <button class="btn btn-decline" onclick="handleDecline()" id="decline-btn">
                رفض الطلب
            </button>
        </div>
    </div>

    <!-- Notification Area -->
    <div id="notification"></div>

    <script>
        // ==============================================
        // ✅ Supabase Configuration
        // ==============================================
        const tarhalDB = supabase.createClient(window.SB_URL, window.SB_KEY);

        let currentRideId = null;
        let countdownValue = 60;
        let timerInterval = null;

        // ==============================================
        // ✅ Global Handler for Flutter
        // ==============================================
        window.handleIncomingRide = function(data) {
            console.log('Incoming ride data from Flutter Bridge:', data);
            updateUI(data);

            if (data.ride_id) {
                currentRideId = data.ride_id;
            }
        };

        // ==============================================
        // ✅ Initialization
        // ==============================================
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentRideId = urlParams.get('rideId') || urlParams.get('ride_id');

            if (currentRideId) {
                fetchRideDetails(currentRideId);
            }

            startTimer();
            triggerVibration();
        });

        async function fetchRideDetails(rideId) {
            try {
                const { data, error } = await tarhalDB
                    .from('rides')
                    .select('*')
                    .eq('id', rideId)
                    .single();

                if (error) throw error;
                if (data) {
                    updateUI({
                        customer_name: data.passenger_name || data.customer_name,
                        amount: data.amount || data.final_price,
                        distance: data.distance_km || data.distance,
                        pickup_address: data.pickup_address,
                        ride_id: data.id
                    });

                    // Enable acceptance button after data is loaded
                    document.getElementById('accept-btn').disabled = false;
                }
            } catch (err) {
                console.error('Error fetching ride details:', err);
                showToast('❌ فشل تحميل بيانات الرحلة', 'error');
            }
        }

        function updateUI(data) {
            if (data.customer_name) document.getElementById('customer-name').textContent = data.customer_name;
            if (data.amount) document.getElementById('amount').textContent = data.amount;
            if (data.distance) document.getElementById('distance').textContent = data.distance;
            if (data.pickup_address) document.getElementById('pickup-location').textContent = data.pickup_address;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                countdownValue--;
                document.getElementById('countdown').textContent = countdownValue;
                
                if (countdownValue <= 0) {
                    clearInterval(timerInterval);
                    autoDecline();
                }
            }, 1000);
        }

        function triggerVibration() {
            if ('vibrate' in navigator) {
                navigator.vibrate([500, 200, 500, 200, 500]);
            }
        }

        // ==============================================
        // ✅ Accept/Decline Logic
        // ==============================================
        async function handleAccept() {
            if (!currentRideId) {
                showToast('خطأ: لا يوجد معرف للرحلة', 'error');
                return;
            }

            setLoading(true, 'accept');
            clearInterval(timerInterval);

            try {
                const { error } = await tarhalDB
                    .from('rides')
                    .update({
                        status: 'accepted',
                        driver_accepted: true,
                        accepted_at: new Date().toISOString()
                    })
                    .eq('id', currentRideId);

                if (error) throw error;

                showToast('✅ تم قبول الرحلة بنجاح!', 'success');
                if (window.soundManager) window.soundManager.playSuccessSound();
                
                // إبلاغ Flutter
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('rideAccepted', { ride_id: currentRideId });
                }

                setTimeout(() => {
                    // التوجه لصفحة تتبع الرحلة
                    window.location.href = `active-ride.html?rideId=${currentRideId}`;
                }, 1500);

            } catch (err) {
                console.error('Accept error:', err);
                showToast('❌ فشل قبول الرحلة، حاول مرة أخرى', 'error');
                setLoading(false, 'accept');
                startTimer();
            }
        }

        async function handleDecline() {
            if (!currentRideId) {
                window.location.href = 'index.html';
                return;
            }

            setLoading(true, 'decline');
            clearInterval(timerInterval);

            try {
                const { error } = await tarhalDB
                    .from('rides')
                    .update({
                        status: 'driver_rejected',
                        driver_rejected: true
                    })
                    .eq('id', currentRideId);

                if (error) throw error;

                showToast('تم رفض الرحلة');

                // إبلاغ Flutter
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('rideRejected', { ride_id: currentRideId });
                }

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (err) {
                console.error('Decline error:', err);
                window.location.href = 'index.html';
            }
        }

        function autoDecline() {
            handleDecline();
        }

        function setLoading(loading, type) {
            const acceptBtn = document.getElementById('accept-btn');
            const declineBtn = document.getElementById('decline-btn');

            if (loading) {
                acceptBtn.disabled = true;
                declineBtn.disabled = true;
                if (type === 'accept') {
                    acceptBtn.innerHTML = '<div class="spinner"></div> جاري القبول...';
                }
            } else {
                acceptBtn.disabled = false;
                declineBtn.disabled = false;
                acceptBtn.innerHTML = '<ion-icon name="checkmark-circle"></ion-icon> قــبـول الـرحـلـة';
            }
        }

        function showToast(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.display = 'block';
            notification.style.backgroundColor = type === 'error' ? '#fee2e2' : '#dcfce7';
            notification.style.color = type === 'error' ? '#dc2626' : '#15803d';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
