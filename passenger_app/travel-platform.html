        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showNotification(message, type = 'info', title = null) {
            const container = document.getElementById('notification-container');
            
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            
            let icon = 'ph-info';
            let notificationTitle = 'معلومة';
            
            if (type === 'success') {
                icon = 'ph-check-circle';
                notificationTitle = 'نجاح';
            } else if (type === 'error') {
                icon = 'ph-x-circle';
                notificationTitle = 'خطأ';
            } else if (type === 'warning') {
                icon = 'ph-warning';
                notificationTitle = 'تحذير';
            }
            
            if (title) {
                notificationTitle = title;
            }
            
            notification.innerHTML = `
                <div class="notification-icon"><i class="ph-bold ${icon} neon-icon-blue"></i></div>
                <div class="notification-content">
                    <div class="notification-title" style="color: var(--neon-blue);">${notificationTitle}</div>
                    <div class="notification-message" style="font-weight: 600;">${escapeHtml(message)}</div>
                </div>
                <button onclick="this.parentElement.remove()" style="
                    background: none; 
                    border: none; 
                    cursor: pointer; 
                    color: var(--gray-500); 
                    font-size: 1.25rem;
                    padding: 0.25rem;
                    border-radius: var(--radius-sm);
                ">
                    &times;
                </button>
            `;
            
            container.appendChild(notification);
            
            // إضافة تأثير بصري عند ظهور الإشعار
            if (type === 'success' || type === 'warning') {
                notification.style.animation = 'slideInRight 0.3s ease';
            }

            // Auto remove after 5 seconds
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 5000);
        }

        // دالة إضافية لإشعارات أكثر احترافية
        function showEnhancedNotification(message, type = 'info') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `notification notification-${type}`; // Removed status-updated to stop pulse

            const icons = {
                'success': 'ph-check-circle',
                'info': 'ph-info',
                'warning': 'ph-warning',
                'error': 'ph-x-circle'
            };

            toast.innerHTML = `
                <div class="notification-icon"><i class="ph-bold ${icons[type] || 'ph-sparkle'} neon-icon-blue"></i></div>
                <div class="notification-content">
                    <div class="notification-title" style="color: var(--neon-blue);">تنبيه منصة ترحال</div>
                    <div class="notification-message" style="font-weight:700;">${escapeHtml(message)}</div>
                </div>
            `;

            // Simple slide in for all notifications
            toast.style.animation = 'slideInRight 0.3s ease';

            container.appendChild(toast);

            // تشغيل صوت تنبيه بسيط إذا كان مدعوماً
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, context.currentTime);
                oscillator.connect(context.destination);
                oscillator.start();
                oscillator.stop(context.currentTime + 0.1);
            } catch (e) {}

            setTimeout(() => toast.remove(), 6000);
        }

        // إضافة استماع لزر الإدخال في المحادثة
        document.getElementById('chat-input')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Filter available rides by city
        document.getElementById('filter-city')?.addEventListener('change', displayAvailableRides);

        // Initialize price preview when cities are selected
        document.addEventListener('change', function(e) {
            if (e.target.id === 'from-city' || e.target.id === 'to-city') {
                updatePricePreview();
            }
        });

        // WhatsApp integration function
        function contactViaWhatsApp(phoneNumber, message) {
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        // ============================================
        // ADDITIONAL UTILITY FUNCTIONS
        // ============================================
        async function cancelRide(rideId) {
            if (!confirm('هل أنت متأكد من إلغاء هذه الرحلة؟')) return;
            
            try {
                const { error } = await travelSupabase
                    .from('ride_requests')
                    .update({ status: 'cancelled' })
                    .eq('id', rideId);
                
                if (error) throw error;
                
                showNotification('تم إلغاء الرحلة بنجاح', 'success');
                await loadPassengerRides();
                
            } catch (error) {
                console.error('Error cancelling ride:', error);
                showNotification('خطأ في إلغاء الرحلة', 'error');
            }
        }

        // دالة لتحديث قائمة الرحلات بعد الإجراءات
        async function refreshPassengerRides() {
            await loadPassengerRides();
            displayPassengerRides();
        }
    </script>
</body>
</html>
